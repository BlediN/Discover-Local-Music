<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discover Local Music</title>
    <link rel="stylesheet" href="/pico-main/css/pico.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main class="container">
        <header>
            <h1>🎵 Discover Local Music</h1>
            <p class="subtitle">Find upcoming concerts, open mic nights, and music festivals near your college</p>
        </header>

        <section class="filter-section">
            <label for="genre-filter">Filter by Genre:</label>
            <select id="genre-filter">
                <option value="">All Genres</option>
                <option value="Indie">Indie</option>
                <option value="Hip-Hop">Hip-Hop</option>
                <option value="EDM">EDM</option>
                <option value="Acoustic">Acoustic</option>
                <option value="Blues">Blues</option>
                <option value="Rock">Rock</option>
            </select>

            <label for="price-filter">Filter by Ticket Price:</label>
            <select id="price-filter">
                <option value="">All Prices</option>
                <option value="0">Free</option>
                <option value="1-40">Under $40</option>
                <option value="40-50">$40 - $50</option>
                <option value="50+">$50+</option>
            </select>
        </section>

        <section class="events-grid" id="events-container">
            <!-- Events will be loaded here -->
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
